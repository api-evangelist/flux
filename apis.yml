aid: flux
name: Flux
description: An open-source text-to-image AI model developed by Black Forest Labs
  that generates high-quality images from text prompts with improved prompt following
  and visual quality.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: >-
  https://raw.githubusercontent.com/api-evangelist/flux/refs/heads/main/apis.yml
created: '2025-01-01'
modified: '2026-03-18'
specificationVersion: '0.19'
tags:
  - AI
  - Image Generation
  - Machine Learning
  - Text To Image
  - Open Source
apis:
  - aid: flux:flux-image-generation-api
    name: Flux Image Generation API
    description: >-
      REST API for generating images from text prompts using Black Forest Labs'
      FLUX models, including FLUX.1 [pro], FLUX.1 [dev], FLUX.1 [schnell], and
      FLUX.2 variants. The API follows an asynchronous pattern where requests
      return a polling URL to retrieve the completed image result.
    humanURL: https://docs.bfl.ai/
    baseURL: https://api.bfl.ai/v1
    tags:
      - Image Generation
      - Text To Image
      - AI
      - Machine Learning
    properties:
      - type: Documentation
        url: https://docs.bfl.ai/
      - type: Getting Started
        url: https://docs.bfl.ml/quick_start/generating_images
      - type: Authentication
        url: https://docs.bfl.ai/
      - type: OpenAPI
        url: openapi/flux-image-generation-openapi.yml
      - type: JSONSchema
        url: json-schema/flux-generation-request-schema.json
  - aid: flux:flux-image-editing-api
    name: Flux Image Editing API
    description: >-
      REST API for editing and transforming existing images using the FLUX.1
      Kontext models. Accepts an input image and a text prompt describing
      desired edits, and returns a modified image. Supports context-aware
      in-painting, style transfer, and image-to-image transformations.
    humanURL: https://docs.bfl.ml/kontext/kontext_image_editing
    baseURL: https://api.bfl.ai/v1
    tags:
      - Image Editing
      - Image To Image
      - AI
      - Kontext
    properties:
      - type: Documentation
        url: https://docs.bfl.ml/kontext/kontext_image_editing
      - type: OpenAPI
        url: openapi/flux-image-editing-openapi.yml
